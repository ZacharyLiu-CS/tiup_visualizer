# 基础CI流水线模板
# 适用场景: 简单的构建和测试流程

version: v3.0
name: 基础CI流水线

# ========== 触发器 ==========
on:
  push:
    branches:
      - master
      - develop
  mr:
    target-branches:
      - master

# ========== 全局变量 ==========
variables:
  NODE_ENV:
    value: "production"

# ========== 阶段定义 ==========
stages:
  # ========== 构建阶段 ==========
  - name: build
    label: Build
    jobs:
      build-app:
        name: 构建应用
        runs-on:
          pool: docker
          container: node:16
        steps:
          # 拉取代码
          - name: 拉取代码
            checkout: self
            clean: true
          
          # 安装依赖
          - name: 安装依赖
            run: npm ci
          
          # 构建应用
          - name: 构建应用
            run: npm run build
          
          # 上传构建产物
          - name: 上传构建产物
            uses: upload-artifact@v1
            with:
              name: build-artifacts
              path: dist/
  
  # ========== 测试阶段 ==========
  - name: test
    label: Test
    jobs:
      unit-test:
        name: 单元测试
        runs-on:
          pool: docker
          container: node:16
        steps:
          # 拉取代码
          - name: 拉取代码
            checkout: self
          
          # 运行单元测试
          - name: 运行单元测试
            run: npm test
          
          # 生成测试报告
          - name: 生成测试报告
            run: npm run test:coverage
            continueOnError: true

# ========== 通知配置 ==========
notices:
  # 失败通知
  - type: email
    title: 构建失败 - ${{ ci.branch }}
    content: |
      流水线执行失败
      分支: ${{ ci.branch }}
      提交: ${{ ci.commit_sha }}
    if: FAILURE
  
  # 成功通知
  - type: wework-message
    title: 构建成功
    content: 流水线执行成功
    if: SUCCESS
