# 构建+部署流水线模板
# 适用场景: 完整的构建、测试、部署流程,支持多环境部署

version: v3.0
name: 构建和部署流水线

# ========== 全局变量 ==========
variables:
  APP_NAME:
    value: "myapp"
  REGISTRY:
    value: "registry.example.com"
  DEPLOY_ENV:
    value: "test"
    allow-modify-at-startup: true
    props:
      type: selector
      options:
        - id: test
          label: 测试环境
        - id: prod
          label: 生产环境

# ========== 触发器 ==========
on:
  push:
    branches:
      - master
      - develop
  tag:
    tags:
      - v*

# ========== 阶段定义 ==========
stages:
  # ========== 构建阶段 ==========
  - name: build
    label: Build
    jobs:
      build-docker:
        name: 构建Docker镜像
        runs-on:
          pool: docker
          container: docker:latest
        steps:
          - name: 拉取代码
            checkout: self
          
          - name: Docker登录
            run: |
              echo "${{ secrets.DOCKER_PASSWORD }}" | \
              docker login -u "${{ secrets.DOCKER_USERNAME }}" \
                --password-stdin ${{ variables.REGISTRY }}
          
          - name: 构建并推送镜像
            uses: docker/build@v1
            with:
              image: ${{ variables.APP_NAME }}
              tag: ${{ ci.build_number }}
              push: true
              registry: ${{ variables.REGISTRY }}
  
  # ========== 测试阶段 ==========
  - name: test
    label: Test
    jobs:
      integration-test:
        name: 集成测试
        runs-on:
          pool: docker
          container: node:16
        steps:
          - name: 拉取代码
            checkout: self
          
          - name: 运行集成测试
            run: npm run test:integration
  
  # ========== 部署阶段 ==========
  - name: deploy
    label: Deploy
    jobs:
      deploy-app:
        name: 部署应用
        if: variables.DEPLOY_ENV == 'test' || variables.DEPLOY_ENV == 'prod'
        runs-on:
          pool: k8s
        steps:
          - name: 配置kubectl
            env:
              K8S_TOKEN: ${{ secrets.K8S_TOKEN }}
              K8S_SERVER: ${{ secrets.K8S_SERVER }}
            run: |
              kubectl config set-cluster k8s --server=$K8S_SERVER
              kubectl config set-credentials user --token=$K8S_TOKEN
              kubectl config use-context default
          
          - name: 部署应用
            run: |
              kubectl set image deployment/${{ variables.APP_NAME }} \
                app=${{ variables.REGISTRY }}/${{ variables.APP_NAME }}:${{ ci.build_number }} \
                --namespace=${{ variables.DEPLOY_ENV }}
          
          - name: 等待部署完成
            run: |
              kubectl rollout status deployment/${{ variables.APP_NAME }} \
                --namespace=${{ variables.DEPLOY_ENV }} \
                --timeout=5m

# ========== 通知配置 ==========
notices:
  - type: email
    title: 部署通知 - ${{ ci.branch }}
    content: |
      部署状态: ${{ ci.status }}
      分支: ${{ ci.branch }}
      镜像: ${{ variables.APP_NAME }}:${{ ci.build_number }}
      环境: ${{ variables.DEPLOY_ENV }}
    if: ALWAYS
